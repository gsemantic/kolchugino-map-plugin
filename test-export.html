<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест экспорта GeoJSON</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 30px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .button {
            background: #2271b1;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .button:hover {
            background: #135e96;
        }
        .error {
            color: #d63638;
            background: #f2f2f2;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
        .success {
            color: #1e7e34;
            background: #f2f2f2;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Тест экспорта GeoJSON</h1>
    
    <div class="test-section">
        <h2>Экспорт через GET-запрос</h2>
        <p>Этот тест проверяет экспорт GeoJSON через обычный GET-запрос с nonce.</p>
        <a href="#" id="exportGeojson" class="button">Экспорт GeoJSON</a>
        <div id="geojsonResult"></div>
    </div>

    <div class="test-section">
        <h2>Экспорт через AJAX</h2>
        <p>Этот тест проверяет экспорт через AJAX-запрос (как в админке).</p>
        <button id="exportAjax" class="button">Экспорт через AJAX</button>
        <div id="ajaxResult"></div>
    </div>

    <div class="test-section">
        <h2>Информация о сервере</h2>
        <div id="serverInfo"></div>
    </div>

    <script>
        // Получаем информацию о сервере
        document.getElementById('serverInfo').innerHTML = `
            <p><strong>WordPress URL:</strong> ${window.location.origin}</p>
            <p><strong>Admin URL:</strong> ${window.location.origin}/wp-admin/</p>
            <p><strong>Admin AJAX URL:</strong> ${window.location.origin}/wp-admin/admin-ajax.php</p>
        `;

        // Тест экспорта через GET
        document.getElementById('exportGeojson').addEventListener('click', function(e) {
            e.preventDefault();
            
            // Создаем nonce
            const nonce = wp.createNonce ? wp.createNonce() : 'test_nonce_' + Date.now();
            
            // Формируем URL с nonce
            const exportUrl = `${window.location.origin}/wp-admin/edit.php?post_type=map_object&kolchugino_export=geojson&nonce=${nonce}`;
            
            console.log('Экспорт URL:', exportUrl);
            
            // Открываем в новой вкладке
            window.open(exportUrl, '_blank');
            
            document.getElementById('geojsonResult').innerHTML = `
                <div class="success">URL экспорта создан. Проверьте консоль браузера.</div>
                <p><strong>Nonce:</strong> ${nonce}</p>
            `;
        });

        // Тест экспорта через AJAX
        document.getElementById('exportAjax').addEventListener('click', function() {
            const nonce = wp.createNonce ? wp.createNonce() : 'test_nonce_' + Date.now();
            
            fetch(`${window.location.origin}/wp-admin/admin-ajax.php`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams({
                    action: 'export_geojson',
                    nonce: nonce
                })
            })
            .then(response => {
                console.log('Response status:', response.status);
                return response.text();
            })
            .then(data => {
                console.log('Response data:', data);
                document.getElementById('ajaxResult').innerHTML = `
                    <div class="success">AJAX запрос выполнен. Статус: ${response.status}</div>
                    <pre style="background: #f5f5f5; padding: 10px; overflow-x: auto;">${data.substring(0, 500)}${data.length > 500 ? '...' : ''}</pre>
                `;
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('ajaxResult').innerHTML = `
                    <div class="error">Ошибка AJAX: ${error.message}</div>
                `;
            });
        });
    </script>
    
    <script src="${window.location.origin}/wp-includes/js/wp-emoji-release.min.js"></script>
</body>
</html>
