name: Generate Offline Map Tiles

on:
  workflow_dispatch:
    inputs:
      min_zoom:
        description: 'Минимальный зум (10-12)'
        required: true
        default: '10'
      max_zoom:
        description: 'Максимальный зум (14-16)'
        required: true
        default: '14'
      district_name:
        description: 'Название района для границ'
        required: true
        default: 'Kolchugino'
  schedule:
    # Запуск раз в месяц (опционально)
    - cron: '0 3 1 * *'

jobs:
  generate-tiles:
    runs-on: ubuntu-latest
    container: ghcr.io/osmcode/tippecanoe:latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install additional tools
      run: |
        apt-get update && apt-get install -y \
          gdal-bin \
          sqlite3 \
          wget \
          curl \
          jq \
          osmium-tool
          
    - name: Download administrative boundaries
      run: |
        # Скачиваем границы Кольчугинского района из Geofabrik или Overpass
        cat > /tmp/query.overpass << 'EOF'
        [out:json][timeout:300];
        area["name"="Кольчугинский район"]->.searchArea;
        (
          relation["boundary"="administrative"](area.searchArea);
        );
        out body;
        >;
        out skel qt;
        EOF
        
        curl -X POST -F "data=@/tmp/query.overpass" \
          https://overpass-api.de/api/interpreter \
          > /tmp/boundaries.json || echo "Failed to fetch from Overpass"
          
        # Альтернатива: извлечение из готового дампа
        if [ ! -s /tmp/boundaries.json ]; then
          wget -q "https://download.geofabrik.de/europe/russia/volga-fed-district-latest.osm.pbf" \
            -O /tmp/district.osm.pbf || true
          
          if [ -f /tmp/district.osm.pbf ]; then
            osmium tags-filter /tmp/district.osm.pbf r/name=Кольчугинский район -o /tmp/kolchugino.osm.pbf
            osmium ocf /tmp/kolchugino.osm.pbf -o data/boundaries/kolchugino_district.geojson
          fi
        fi
        
        # Конвертация в GeoJSON если нужно
        if [ -f /tmp/boundaries.json ]; then
          python3 << 'PYEOF'
import json
with open('/tmp/boundaries.json', 'r') as f:
    data = json.load(f)
# Простая конвертация элементов в GeoJSON
features = []
for elem in data.get('elements', []):
    if elem.get('type') == 'relation' and 'geometry' in elem:
        feature = {
            "type": "Feature",
            "properties": {"name": elem.get('tags', {}).get('name', 'Kolchugino')},
            "geometry": {"type": "MultiPolygon", "coordinates": []}
        }
        # Здесь нужна более сложная логика сборки полигонов
        features.append(feature)
        
geojson = {"type": "FeatureCollection", "features": features}
with open('data/boundaries/kolchugino_district.geojson', 'w') as f:
    json.dump(geojson, f, indent=2)
PYEOF
        fi
        
    - name: Download OSM data for district
      run: |
        # Скачиваем данные OSM для области интереса
        # Используем overpass API для получения данных
        cat > /tmp/overpass_query.txt << EOF
        [out:pbf][bbox:{{bbox}}];
        (
          node["tourism"];
          way["tourism"];
          relation["tourism"];
          node["amenity"];
          way["amenity"];
          relation["amenity"];
          node["shop"];
          way["shop"];
          node["leisure"];
          way["leisure"];
          node["historic"];
          way["historic"];
          node["building"];
          way["building"];
          relation["building"];
          way["waterway"];
          way["natural"];
          way["landuse"];
          way["highway"];
          relation["route"];
        );
        out body;
        >;
        out skel qt;
        EOF
        
        # Получаем bbox из границ
        if [ -f data/boundaries/kolchugino_district.geojson ]; then
          BBOX=$(jq -r '.features[0].bbox | join(",")' data/boundaries/kolchugino_district.geojson 2>/dev/null || echo "41.0,56.0,42.0,57.0")
          sed -i "s/{{bbox}}/$BBOX/" /tmp/overpass_query.txt
        else
          # Примерные координаты Кольчугино
          echo "41.0,56.0,42.0,57.0" > /tmp/bbox.txt
          BBOX="41.0,56.0,42.0,57.0"
        fi
        
        curl -X POST -F "data=@/tmp/overpass_query.txt" \
          https://overpass-api.de/api/interpreter \
          -o data/osm_data.pbf || wget -q "https://download.geofabrik.de/europe/russia/volga-fed-district-latest.osm.pbf" -O data/osm_data.pbf
          
    - name: Generate vector tiles with custom style
      run: |
        # Создаем MBTiles с кастомным стилем
        # Используем tippecanoe для генерации тайлов
        
        MIN_ZOOM=${{ github.event.inputs.min_zoom || 10 }}
        MAX_ZOOM=${{ github.event.inputs.max_zoom || 14 }}
        
        # Если есть GeoJSON границы - добавляем как отдельный слой
        if [ -f data/boundaries/kolchugino_district.geojson ]; then
          tippecanoe -zg \
            --maximum-zoom=$MAX_ZOOM \
            --minimum-zoom=$MIN_ZOOM \
            --output=tiles/kolchugino-offline.mbtiles \
            --layer=boundaries data/boundaries/kolchugino_district.geojson \
            --force
        fi
        
        # Добавляем OSM данные
        if [ -f data/osm_data.pbf ]; then
          tippecanoe -a \
            --maximum-zoom=$MAX_ZOOM \
            --minimum-zoom=$MIN_ZOOM \
            --output=tiles/kolchugino-offline.mbtiles \
            --layer=osm_data data/osm_data.pbf \
            --force \
            --replace
        fi
        
        # Генерируем XYZ тайлы из MBTiles для совместимости
        if [ -f tiles/kolchugino-offline.mbtiles ]; then
          mkdir -p tiles/xyz
          mb-util --image_format=png tiles/kolchugino-offline.mbtiles tiles/xyz
        fi
        
    - name: Create preview image
      run: |
        # Создаем превью карты (первый тайл z=10)
        if [ -d tiles/xyz/10/0 ]; then
          cp tiles/xyz/10/0/0.png tiles/preview.png 2>/dev/null || true
        fi
        
    - name: Upload tiles as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kolchugino-offline-tiles
        path: |
          tiles/*.mbtiles
          tiles/xyz/
          tiles/preview.png
        retention-days: 30
        compression-level: 6
        
    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./tiles/xyz
        destination_dir: offline-tiles
        force_orphan: false
        enable_jekyll: false
        
    - name: Update tiles info
      run: |
        echo "## Результаты генерации тайлов" > tiles/INFO.md
        echo "- Дата: $(date -u +"%Y-%m-%d %H:%M UTC")" >> tiles/INFO.md
        echo "- Мин. зум: ${{ github.event.inputs.min_zoom || 10 }}" >> tiles/INFO.md
        echo "- Макс. зум: ${{ github.event.inputs.max_zoom || 14 }}" >> tiles/INFO.md
        
        if [ -f tiles/kolchugino-offline.mbtiles ]; then
          SIZE=$(du -h tiles/kolchugino-offline.mbtiles | cut -f1)
          echo "- Размер MBTiles: $SIZE" >> tiles/INFO.md
        fi
        
        if [ -d tiles/xyz ]; then
          TILE_COUNT=$(find tiles/xyz -name "*.png" | wc -l)
          XYZ_SIZE=$(du -sh tiles/xyz | cut -f1)
          echo "- Количество XYZ тайлов: $TILE_COUNT" >> tiles/INFO.md
          echo "- Размер XYZ: $XYZ_SIZE" >> tiles/INFO.md
        fi
        
    - name: Commit tiles info
      if: github.ref == 'refs/heads/main'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add tiles/INFO.md || true
        git commit -m "Update tiles generation info [skip ci]" || true
        git push || true
