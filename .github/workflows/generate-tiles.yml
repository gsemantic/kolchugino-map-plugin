name: Generate Offline Map Tiles

on:
  workflow_dispatch:
    inputs:
      min_zoom:
        description: 'Минимальный зум (10-12)'
        required: true
        default: '10'
      max_zoom:
        description: 'Максимальный зум (14-16)'
        required: true
        default: '14'
      district_name:
        description: 'Название района для границ'
        required: true
        default: 'Kolchugino'
  schedule:
    # Запуск раз в месяц (опционально)
    - cron: '0 3 1 * *'

jobs:
  generate-tiles:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y \
          libsqlite3-dev \
          zlib1g-dev \
          libpng-dev \
          libjpeg-dev \
          libprotobuf-dev \
          protobuf-compiler \
          libboost-all-dev \
          gdal-bin \
          sqlite3 \
          wget \
          curl \
          jq \
          osmium-tool \
          python3-pip
          
    - name: Install mb-util
      run: |
        pip3 install --user mbutil
        
    - name: Build and install Tippecanoe
      run: |
        cd /tmp
        git clone --depth 1 https://github.com/felt/tippecanoe.git
        cd tippecanoe
        make -j$(nproc)
        sudo make install
        tippecanoe --version
        
    - name: Download administrative boundaries
      run: |
        mkdir -p data/boundaries
        
        # Скачиваем границы Кольчугинского района из Overpass
        cat > /tmp/query.overpass << 'EOF'
        [out:json][timeout:300];
        area[admin_level=6][name~"Кольчугин"]->.searchArea;
        (
          relation[boundary=administrative](area.searchArea);
        );
        out body;
        >;
        out skel qt;
        EOF
        
        curl -X POST -F "data=@/tmp/query.overpass" \
          https://overpass-api.de/api/interpreter \
          > /tmp/boundaries.json || echo "Failed to fetch from Overpass"
          
        # Конвертация JSON в GeoJSON
        if [ -s /tmp/boundaries.json ]; then
          python3 << 'PYEOF'
import json
import sys

try:
    with open('/tmp/boundaries.json', 'r') as f:
        data = json.load(f)
    
    features = []
    for elem in data.get('elements', []):
        if elem.get('type') == 'relation' and 'geometry' in elem:
            # Собираем координаты из ways
            nodes = {}
            for node in data.get('elements', []):
                if node.get('type') == 'node':
                    nodes[node['id']] = [node.get('lon'), node.get('lat')]
            
            coords = []
            for way in elem.get('geometry', []):
                if isinstance(way, list):
                    ring = []
                    for node_id in way:
                        if node_id in nodes:
                            ring.append(nodes[node_id])
                    if len(ring) > 2:
                        coords.append([ring])
            
            if coords:
                feature = {
                    "type": "Feature",
                    "properties": {"name": elem.get('tags', {}).get('name', 'Kolchugino')},
                    "geometry": {"type": "MultiPolygon", "coordinates": coords}
                }
                features.append(feature)
    
    geojson = {"type": "FeatureCollection", "features": features}
    with open('data/boundaries/kolchugino_district.geojson', 'w') as f:
        json.dump(geojson, f, indent=2)
    print(f"Saved {len(features)} features")
except Exception as e:
    print(f"Error: {e}", file=sys.stderr)
    sys.exit(1)
PYEOF
        fi
        
        # Fallback: если не получилось, используем bbox
        if [ ! -s data/boundaries/kolchugino_district.geojson ]; then
          echo '{"type":"FeatureCollection","features":[{"type":"Feature","properties":{"name":"Kolchugino"},"geometry":{"type":"Polygon","coordinates":[[[41.0,56.0],[42.0,56.0],[42.0,57.0],[41.0,57.0],[41.0,56.0]]]}}]}' > data/boundaries/kolchugino_district.geojson
          echo "Using fallback bbox"
        fi
        
    - name: Download OSM data for district
      run: |
        mkdir -p data
        
        # Получаем bbox из границ
        BBOX=$(jq -r '.features[0].geometry.coordinates[0][0] | [.[0][0], .[1][0], .[2][0], .[3][1]] | join(",")' data/boundaries/kolchugino_district.geojson 2>/dev/null || echo "")
        
        if [ -z "$BBOX" ] || [ "$BBOX" = "null" ]; then
          BBOX="41.0,56.0,42.0,57.0"
        fi
        
        echo "Using bbox: $BBOX"
        
        # Запрос к Overpass API
        cat > /tmp/overpass_query.txt << EOF
[out:pbf][bbox:$BBOX];
(
  node["tourism"];
  way["tourism"];
  relation["tourism"];
  node["amenity"];
  way["amenity"];
  relation["amenity"];
  node["shop"];
  way["shop"];
  node["leisure"];
  way["leisure"];
  node["historic"];
  way["historic"];
  node["building"];
  way["building"];
  relation["building"];
  way["waterway"];
  way["natural"];
  way["landuse"];
  way["highway"];
  relation["route"];
);
out body;
>;
out skel qt;
EOF
        
        curl -X POST -F "data=@/tmp/overpass_query.txt" \
          https://overpass-api.de/api/interpreter \
          -o data/osm_data.pbf || echo "Overpass failed, trying Geofabrik..."
          
        # Fallback на Geofabrik если Overpass не сработал
        if [ ! -s data/osm_data.pbf ]; then
          wget -q "https://download.geofabrik.de/europe/russia/volga-fed-district-latest.osm.pbf" \
            -O /tmp/volga.osm.pbf || true
          
          if [ -f /tmp/volga.osm.pbf ]; then
            osmium tags-filter /tmp/volga.osm.pfb b/$BBOX -o data/osm_data.pbf || cp /tmp/volga.osm.pbf data/osm_data.pbf
          fi
        fi
        
    - name: Generate vector tiles with custom style
      run: |
        mkdir -p tiles
        
        MIN_ZOOM=${{ github.event.inputs.min_zoom || 10 }}
        MAX_ZOOM=${{ github.event.inputs.max_zoom || 14 }}
        
        echo "Generating tiles from zoom $MIN_ZOOM to $MAX_ZOOM"
        
        # Создаем MBTiles с границами и OSM данными
        tippecanoe -zg \
          --maximum-zoom=$MAX_ZOOM \
          --minimum-zoom=$MIN_ZOOM \
          --output=tiles/kolchugino-offline.mbtiles \
          --layer=boundaries data/boundaries/kolchugino_district.geojson \
          --layer=osm_data data/osm_data.pbf \
          --force \
          --drop-densest-as-needed \
          --drop-farther-than=10 \
          --coarsest-resolution=4096 \
          --finest-resolution=1 \
          --no-tile-size-limit \
          2>&1 | tee /tmp/tippecanoe.log || echo "Tippecanoe completed with warnings"
          
        # Проверка результата
        if [ -f tiles/kolchugino-offline.mbtiles ]; then
          echo "MBTiles created successfully"
          sqlite3 tiles/kolchugino-offline.mbtiles "SELECT COUNT(*) FROM tiles;" || true
        else
          echo "ERROR: MBTiles not created!"
          exit 1
        fi
        
        # Генерируем XYZ тайлы из MBTiles
        mkdir -p tiles/xyz
        if command -v mb-util &> /dev/null; then
          mb-util --image_format=png tiles/kolchugino-offline.mbtiles tiles/xyz || echo "mb-util failed"
        else
          echo "mb-util not found, skipping XYZ generation"
        fi
        
    - name: Create preview image
      run: |
        if [ -d tiles/xyz/10 ]; then
          find tiles/xyz/10 -name "*.png" | head -1 | xargs -I {} cp {} tiles/preview.png 2>/dev/null || true
        fi
        
    - name: Upload tiles as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kolchugino-offline-tiles
        path: |
          tiles/*.mbtiles
          tiles/xyz/
          tiles/preview.png
        retention-days: 30
        compression-level: 6
        
    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./tiles/xyz
        destination_dir: offline-tiles
        force_orphan: false
        enable_jekyll: false
        
    - name: Update tiles info
      run: |
        echo "## Результаты генерации тайлов" > tiles/INFO.md
        echo "- Дата: $(date -u +'%Y-%m-%d %H:%M UTC')" >> tiles/INFO.md
        echo "- Мин. зум: ${{ github.event.inputs.min_zoom || 10 }}" >> tiles/INFO.md
        echo "- Макс. зум: ${{ github.event.inputs.max_zoom || 14 }}" >> tiles/INFO.md
        
        if [ -f tiles/kolchugino-offline.mbtiles ]; then
          SIZE=$(du -h tiles/kolchugino-offline.mbtiles | cut -f1)
          echo "- Размер MBTiles: $SIZE" >> tiles/INFO.md
        fi
        
        if [ -d tiles/xyz ]; then
          TILE_COUNT=$(find tiles/xyz -name "*.png" | wc -l)
          XYZ_SIZE=$(du -sh tiles/xyz 2>/dev/null | cut -f1 || echo "N/A")
          echo "- Количество XYZ тайлов: $TILE_COUNT" >> tiles/INFO.md
          echo "- Размер XYZ: $XYZ_SIZE" >> tiles/INFO.md
        fi
        
    - name: Commit tiles info
      if: github.ref == 'refs/heads/main'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add tiles/INFO.md || true
        git commit -m "Update tiles generation info [skip ci]" || true
        git push || true
