name: Generate Offline Map Tiles

on:
  workflow_dispatch:
    inputs:
      min_zoom:
        description: 'Min zoom level'
        required: true
        default: '12'
      max_zoom:
        description: 'Max zoom level'
        required: true
        default: '18'
      district_name:
        description: 'District name for boundary search'
        required: true
        default: 'Кольчугинский район'
  schedule:
    - cron: '0 3 * * 0'

jobs:
  generate-tiles:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            tippecanoe \
            python3-pip \
            osmium-tool \
            gdal-bin \
            sqlite3 \
            curl \
            jq
          pip3 install mbutil

      - name: Download OSM Data via Overpass API
        id: download_overpass
        run: |
          set -euo pipefail
          echo "Downloading OSM data for Vladimir Region via Overpass API..."
          
          cat > overpass-query.ql << 'QUERYEOF'
          [out:xml][timeout:300];
          (
            way["highway"](56.24,39.32,56.34,39.43);
            way["building"](56.24,39.32,56.34,39.43);
            relation["boundary"="administrative"]["admin_level"~"4|5|6|7"]["name"~"Владимир|Кольчугин"];
          );
          out body;
          >;
          out skel qt;
          (
            node["place"](56.24,39.32,56.34,39.43);
          );
          out body;
          QUERYEOF
          
          MAX_RETRIES=3
          RETRY_COUNT=0
          SUCCESS=false
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$SUCCESS" = "false" ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Attempt $RETRY_COUNT of $MAX_RETRIES..."
            
            curl -s -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "data@overpass-query.ql" \
              -o region.osm \
              "https://overpass-api.de/api/interpreter"
            
            if [ -f region.osm ] && [ -s region.osm ]; then
              if ! head -c 200 region.osm | grep -qi "<html"; then
                SUCCESS=true
                echo "Download successful!"
              else
                echo "Attempt $RETRY_COUNT failed: Server returned HTML error"
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo "Waiting 30 seconds before retry..."
                  sleep 30
                fi
              fi
            else
              echo "Attempt $RETRY_COUNT failed: Empty response"
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "Waiting 30 seconds before retry..."
                sleep 30
              fi
            fi
          done
          
          if [ "$SUCCESS" = "false" ]; then
            echo "::error::Overpass API failed after $MAX_RETRIES attempts"
            if [ -f region.osm ]; then
              echo "Last response:"
              cat region.osm
            fi
            exit 1
          fi
          
          echo "Response size: $(du -h region.osm | cut -f1)"
          
          osmium cat region.osm -o region_unsorted.osm.pbf --overwrite
          osmium sort region_unsorted.osm.pbf -o region.osm.pbf --overwrite
          rm -f region_unsorted.osm.pbf
          
          echo "PBF size: $(du -h region.osm.pbf | cut -f1)"

      - name: Extract District Boundary
        id: extract_boundary
        run: |
          set -euo pipefail
          DISTRICT_NAME="${{ github.event.inputs.district_name || 'Кольчугинский район' }}"
          echo "Searching for boundary: $DISTRICT_NAME"
          
          osmium tags-filter -o boundary.osm.pbf region.osm.pbf \
            r/boundary=administrative \
            --overwrite
          
          if [ ! -f boundary.osm.pbf ] || [ ! -s boundary.osm.pbf ]; then
            echo "::error::Boundary extraction failed"
            exit 1
          fi
          
          osmium cat boundary.osm.pbf -o boundary.osm

          mkdir -p osm_layers

          for layer in points lines multilinestrings multipolygons other_relations; do
            if ogr2ogr -f GeoJSON "osm_layers/${layer}.geojson" boundary.osm "$layer" 2>/dev/null; then
              echo "Converted layer: $layer"
            fi
          done

          python3 scripts/merge_layers.py
          export DISTRICT_NAME="$DISTRICT_NAME" && python3 scripts/find_district_boundary.py

          if [ ! -f district.geojson ] || [ ! -s district.geojson ]; then
            echo "::warning::District boundary not found, using full region data"
            if [ -f osm_layers/multipolygons.geojson ]; then
              cp osm_layers/multipolygons.geojson district.geojson
            elif [ -f region_combined.geojson ]; then
              cp region_combined.geojson district.geojson
            else
              echo "::error::No fallback data available"
              exit 1
            fi
          fi

          echo "district_file=district.geojson" >> $GITHUB_OUTPUT

      - name: Generate Map Tiles
        id: generate_tiles
        run: |
          set -euo pipefail
          MIN_ZOOM="${{ github.event.inputs.min_zoom || 12 }}"
          MAX_ZOOM="${{ github.event.inputs.max_zoom || 18 }}"
          
          echo "Generating tiles from zoom $MIN_ZOOM to $MAX_ZOOM..."
          
          mkdir -p region_layers
          
          OSM_FILE="region.osm.pbf"
          
          echo "📥 Extracting OSM layers directly from PBF..."
          
          for layer in points lines multilinestrings multipolygons other_relations; do
            echo "Extracting layer: $layer"
            if ogr2ogr -f GeoJSON -t_srs EPSG:4326 "region_layers/${layer}.geojson" "$OSM_FILE" "$layer" -skipfailures 2>&1; then
              if [ -f "region_layers/${layer}.geojson" ]; then
                count=$(python3 -c "import json; print(len(json.load(open('region_layers/${layer}.geojson')).get('features', [])))")
                echo "  ✓ $layer: $count features"
              else
                echo "  ⚠ $layer: file not created"
                echo '{"type":"FeatureCollection","features":[]}' > "region_layers/${layer}.geojson"
              fi
            else
              echo "  ⚠ $layer: ogr2ogr failed, creating empty file"
              echo '{"type":"FeatureCollection","features":[]}' > "region_layers/${layer}.geojson"
            fi
          done

          echo "✂️ Filtering features by tags..."
          
          python3 << 'PYEOF'
          import json, os

          def load_features(*files):
              features = []
              for fname in files:
                  if os.path.exists(fname):
                      with open(fname) as f:
                          data = json.load(f)
                          features.extend(data.get('features', []))
              return features

          def save(name, features):
              with open(f'region_layers/{name}.geojson', 'w') as f:
                  json.dump({'type': 'FeatureCollection', 'features': features}, f)
              print(f'  {name}: {len(features)} features')

          roads = [f for f in load_features('region_layers/lines.geojson', 'region_layers/multilinestrings.geojson')
                   if 'highway' in f.get('properties', {})]
          save('roads', roads)

          buildings = [f for f in load_features('region_layers/multipolygons.geojson', 'region_layers/other_relations.geojson')
                       if 'building' in f.get('properties', {})]
          save('building', buildings)

          places = [f for f in load_features('region_layers/points.geojson')
                    if 'place' in f.get('properties', {})]
          save('places', places)

          water = []
          for f in load_features('region_layers/lines.geojson', 'region_layers/multilinestrings.geojson',
                                 'region_layers/multipolygons.geojson', 'region_layers/other_relations.geojson'):
              props = f.get('properties', {})
              if 'water' in props or 'waterway' in props or props.get('natural') == 'water':
                  water.append(f)
          save('water', water)

          landuse = []
          for f in load_features('region_layers/multipolygons.geojson', 'region_layers/other_relations.geojson'):
              props = f.get('properties', {})
              if 'landuse' in props or 'leisure' in props or 'natural' in props:
                  landuse.append(f)
          save('landuse', landuse)
          PYEOF

          echo "=== Sanitizing GeoJSON files ==="
          python3 << 'PYEOF'
          import json, os

          FILES = [
              'district.geojson',
              'region_layers/roads.geojson',
              'region_layers/building.geojson',
              'region_layers/places.geojson',
              'region_layers/water.geojson',
              'region_layers/landuse.geojson'
          ]

          def sanitize(infile, outfile):
              if not os.path.exists(infile):
                  print(f"  File not found: {infile}")
                  return 0
              with open(infile) as f:
                  try:
                      data = json.load(f)
                  except json.JSONDecodeError as e:
                      print(f"  Invalid JSON in {infile}: {e}")
                      return 0
              
              features = data.get('features', [])
              clean = []
              
              for feat in features:
                  geom = feat.get('geometry')
                  if geom is None:
                      continue
                  coords = geom.get('coordinates')
                  if coords is None:
                      continue
                  
                  gtype = geom.get('type', '')
                  if gtype == 'Point':
                      if not coords or len(coords) < 2:
                          continue
                  elif gtype in ('LineString', 'MultiPoint'):
                      if not coords or len(coords) < 1:
                          continue
                  elif gtype in ('Polygon', 'MultiLineString'):
                      if not coords or len(coords) < 1:
                          continue
                  elif gtype in ('MultiPolygon', 'GeometryCollection'):
                      if not coords or len(coords) < 1:
                          continue
                  
                  def check_coords(c):
                      if isinstance(c, (list, tuple)):
                          if len(c) == 2 and isinstance(c[0], (int, float)) and isinstance(c[1], (int, float)):
                              lon, lat = c
                              return -180 <= lon <= 180 and -90 <= lat <= 90
                          return all(check_coords(x) for x in c)
                      return True
                  
                  if not check_coords(coords):
                      continue
                  
                  clean.append(feat)
              
              data['features'] = clean
              with open(outfile, 'w') as f:
                  json.dump(data, f)
              print(f"  {os.path.basename(infile)}: {len(features)} -> {len(clean)} features")
              return len(clean)
          
          for f in FILES:
              sanitize(f, f)
          PYEOF

          echo "=== Diagnostic: Final feature counts ==="
          total=0
          for f in region_layers/roads.geojson region_layers/building.geojson region_layers/places.geojson region_layers/water.geojson region_layers/landuse.geojson; do
            if [ -f "$f" ]; then
              count=$(python3 -c "import json; print(len(json.load(open('$f')).get('features', [])))")
              echo "  $f: $count features"
              total=$((total + count))
            else
              echo "  $f: FILE NOT FOUND"
            fi
          done
          echo "  TOTAL: $total features"
          echo "==============================="

          if [ "$total" -eq 0 ]; then
            echo "❌ CRITICAL ERROR: No features found in any layer!"
            exit 1
          fi

          echo "🗺 Generating tiles with tippecanoe directly to directory..."
          rm -rf tiles/
          
          args=(-e tiles/ --force -Z"$MIN_ZOOM" -z"$MAX_ZOOM" --no-tile-size-limit --no-feature-limit --detect-longitude-wraparound --reorder --drop-densest-as-needed --extend-zooms-if-still-dropping)
          
          add_layer() {
            local name="$1"
            local file="$2"
            if [ -f "$file" ] && [ -s "$file" ]; then
              local count
              count=$(python3 -c "import json; print(len(json.load(open('$file')).get('features', [])))")
              if [ "$count" -gt 0 ]; then
                args+=(-l "$name" "$file")
                echo "  → Adding layer '$name' ($count features)"
              else
                echo "  → Skipping empty layer '$name'"
              fi
            else
              echo "  → Skipping missing layer '$name'"
            fi
          }
          
          add_layer "boundaries" district.geojson
          add_layer "transportation" region_layers/roads.geojson
          add_layer "building" region_layers/building.geojson
          add_layer "places" region_layers/places.geojson
          add_layer "water" region_layers/water.geojson
          add_layer "landuse" region_layers/landuse.geojson
          
          if [ ${#args[@]} -le 12 ]; then
            echo "❌ No valid layers to process!"
            exit 1
          fi
          
          set +e
          tippecanoe "${args[@]}" > tippecanoe.log 2>&1
          TIPPECANOE_EXIT=$?
          set -e
          
          if [ $TIPPECANOE_EXIT -ne 0 ]; then
            echo "❌ tippecanoe failed with exit code $TIPPECANOE_EXIT"
            echo "=== tippecanoe stdout+stderr ==="
            cat tippecanoe.log
            echo "=================================="
            exit 1
          fi
          
          cat tippecanoe.log
          
          TILE_COUNT=$(find tiles/ -type f -name '*.pbf' | wc -l)
          echo "✅ Generated $TILE_COUNT tiles in tiles/"
          
          if [ "$TILE_COUNT" -eq 0 ]; then
            echo "❌ No tiles were generated!"
            exit 1
          fi
          
          if [ ! -f tiles/metadata.json ]; then
            echo '{}' > tiles/metadata.json
          fi
          
          echo "Zoom levels found:"
          ls tiles/ | grep -E '^[0-9]+$' | sort -n || echo "No zoom level directories found!"
          
          echo "Sample tiles (first 5):"
          find tiles/ -type f -name '*.pbf' | sed -n '1,5p'

      - name: Upload Tiles Artifact
        uses: actions/upload-artifact@v4
        with:
          name: map-tiles
          path: tiles/
          retention-days: 7

      - name: Commit and Push Tiles
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add tiles/ || true
          git commit -m "Update map tiles [skip ci]" || true
          git push || true
