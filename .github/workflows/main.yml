     name: Generate Offline Map Tiles

on:
  workflow_dispatch:
    inputs:
      min_zoom:
        description: 'Min zoom level'
        required: true
        default: '12'
      max_zoom:
        description: 'Max zoom level'
        required: true
        default: '18'
      district_name:
        description: 'District name for boundary search'
        required: true
        default: 'Кольчугинский район'
  schedule:
    - cron: '0 3 * * 0'

jobs:
  generate-tiles:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            tippecanoe \
            python3-pip \
            osmium-tool \
            gdal-bin \
            sqlite3 \
            curl \
            jq
          pip3 install mbutil

      - name: Download OSM Data via Overpass API
        id: download_overpass
        run: |
          echo "Downloading OSM data for Vladimir Region via Overpass API..."
          
