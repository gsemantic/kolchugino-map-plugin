name: Generate Offline Map Tiles

on:
  workflow_dispatch:
    inputs:
      min_zoom:
        description: 'Min zoom level'
        required: true
        default: '12'
      max_zoom:
        description: 'Max zoom level'
        required: true
        default: '18'
      district_name:
        description: 'District name for boundary search'
        required: true
        default: 'Кольчугинский район'
  schedule:
    - cron: '0 3 * * 0'

jobs:
  generate-tiles:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            tippecanoe \
            python3-pip \
            osmium-tool \
            gdal-bin \
            sqlite3 \
            curl \
            jq
          pip3 install mbutil

      - name: Download OSM Data via Overpass API
        id: download_overpass
        run: |
          echo "Downloading OSM data for Vladimir Region via Overpass API..."
          
          cat > overpass-query.ql << 'QUERYEOF'
          [out:xml][timeout:300];
          (
            // Загружаем все дороги, здания и места в области вокруг Кольчугино (центр: 56.294425, 39.375751)
            way["highway"](56.24,39.32,56.34,39.43);
            node["place"](56.24,39.32,56.34,39.43);
            way["building"](56.24,39.32,56.34,39.43);
            
            // Загружаем административные границы всех уровней для Владимирской области
            relation["boundary"="administrative"]["admin_level"~"4|5|6|7"]["name"~"Владимир|Кольчугин"];
          );
          out body;
          QUERYEOF
          
          # Retry logic for Overpass API (up to 3 attempts with delays)
          MAX_RETRIES=3
          RETRY_COUNT=0
          SUCCESS=false
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$SUCCESS" = "false" ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Attempt $RETRY_COUNT of $MAX_RETRIES..."
            
            curl -s -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "data@overpass-query.ql" \
              -o region.osm \
              "https://overpass-api.de/api/interpreter"
            
            if [ -f region.osm ] && [ -s region.osm ]; then
              # Check if response contains HTML error page
              if ! head -c 200 region.osm | grep -qi "<html"; then
                SUCCESS=true
                echo "Download successful!"
              else
                echo "Attempt $RETRY_COUNT failed: Server returned HTML error"
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo "Waiting 30 seconds before retry..."
                  sleep 30
                fi
              fi
            else
              echo "Attempt $RETRY_COUNT failed: Empty response"
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "Waiting 30 seconds before retry..."
                sleep 30
              fi
            fi
          done
          
          if [ "$SUCCESS" = "false" ]; then
            echo "::error::Overpass API failed after $MAX_RETRIES attempts"
            if [ -f region.osm ]; then
              echo "Last response:"
              cat region.osm
            fi
            exit 1
          fi
          
          echo "Response size: $(du -h region.osm | cut -f1)"
          osmium cat region.osm -o region.osm.pbf --overwrite
          echo "PBF size: $(du -h region.osm.pbf | cut -f1)"

      - name: Extract District Boundary
        id: extract_boundary
        run: |
          DISTRICT_NAME="${{ github.event.inputs.district_name || 'Кольчугинский район' }}"
          echo "Searching for boundary: $DISTRICT_NAME"
          
          # Filter administrative boundaries
          osmium tags-filter -o boundary.osm.pbf region.osm.pbf \
            r/boundary=administrative \
            --overwrite
          
          if [ ! -f boundary.osm.pbf ] || [ ! -s boundary.osm.pbf ]; then
            echo "::error::Boundary extraction failed"
            exit 1
          fi
          
          # Convert PBF to OSM XML first
          osmium cat boundary.osm.pbf -o boundary.osm

          # Создаем директорию для слоев
          mkdir -p osm_layers

          # Конвертируем каждый слой OSM отдельно в GeoJSON
          for layer in points lines multilinestrings multipolygons other_relations; do
            if ogr2ogr -f GeoJSON "osm_layers/${layer}.geojson" boundary.osm "$layer" 2>/dev/null; then
              echo "Converted layer: $layer"
            fi
          done

          # Объединяем все GeoJSON файлы в один
          python3 scripts/merge_layers.py

          # Поиск района в GeoJSON (используем улучшенный скрипт)
          export DISTRICT_NAME="$DISTRICT_NAME" && python3 scripts/find_district_boundary.py

          if [ ! -f district.geojson ] || [ ! -s district.geojson ]; then
            echo "::warning::District boundary not found, using full region data"
            # Если район не найден, используем все границы из файла
            if [ -f osm_layers/multipolygons.geojson ]; then
              cp osm_layers/multipolygons.geojson district.geojson
            elif [ -f region_combined.geojson ]; then
              cp region_combined.geojson district.geojson
            else
              echo "::error::No fallback data available"
              exit 1
            fi
          fi

          echo "district_file=district.geojson" >> $GITHUB_OUTPUT

      - name: Generate Map Tiles
        id: generate_tiles
        run: |
          MIN_ZOOM="${{ github.event.inputs.min_zoom || 12 }}"
          MAX_ZOOM="${{ github.event.inputs.max_zoom || 18 }}"
          
          echo "Generating tiles from zoom $MIN_ZOOM to $MAX_ZOOM..."
          
          mkdir -p region_layers
          
          # Используем region.osm.pbf для извлечения данных через osmium и ogr2ogr
          OSM_PBF="region.osm.pbf"
          
          # --- ЭТАП 1: Извлечение слоев из PBF через osmium ---
          echo "📥 Extracting OSM layers from PBF using osmium..."
          
          # Дороги (highway) - линии и отношения
          echo "Extracting roads..."
          osmium tags-filter "$OSM_PBF" w/highway -o region_layers/roads.osm.pbf --overwrite 2>/dev/null || true
          if [ -f region_layers/roads.osm.pbf ]; then
            osmium cat region_layers/roads.osm.pbf -o region_layers/roads_temp.osm
            ogr2ogr -f GeoJSON -t_srs EPSG:4326 "region_layers/roads.geojson" "region_layers/roads_temp.osm" lines -skipfailures 2>/dev/null || echo '{"type":"FeatureCollection","features":[]}' > "region_layers/roads.geojson"
            rm -f region_layers/roads_temp.osm region_layers/roads.osm.pbf
          else
            echo '{"type":"FeatureCollection","features":[]}' > "region_layers/roads.geojson"
          fi
          
          # Здания (building) - полигоны
          echo "Extracting buildings..."
          osmium tags-filter "$OSM_PBF" w/building -o region_layers/buildings.osm.pbf --overwrite 2>/dev/null || true
          if [ -f region_layers/buildings.osm.pbf ]; then
            osmium cat region_layers/buildings.osm.pbf -o region_layers/buildings_temp.osm
            ogr2ogr -f GeoJSON -t_srs EPSG:4326 "region_layers/building.geojson" "region_layers/buildings_temp.osm" multipolygons -skipfailures 2>/dev/null || echo '{"type":"FeatureCollection","features":[]}' > "region_layers/building.geojson"
            rm -f region_layers/buildings_temp.osm region_layers/buildings.osm.pbf
          else
            echo '{"type":"FeatureCollection","features":[]}' > "region_layers/building.geojson"
          fi
          
          # Места (place) - точки
          echo "Extracting places..."
          osmium tags-filter "$OSM_PBF" n/place -o region_layers/places.osm.pbf --overwrite 2>/dev/null || true
          if [ -f region_layers/places.osm.pbf ]; then
            osmium cat region_layers/places.osm.pbf -o region_layers/places_temp.osm
            ogr2ogr -f GeoJSON -t_srs EPSG:4326 "region_layers/places.geojson" "region_layers/places_temp.osm" points -skipfailures 2>/dev/null || echo '{"type":"FeatureCollection","features":[]}' > "region_layers/places.geojson"
            rm -f region_layers/places_temp.osm region_layers/places.osm.pbf
          else
            echo '{"type":"FeatureCollection","features":[]}' > "region_layers/places.geojson"
          fi
          
          # Вода (water, waterway, natural=water)
          echo "Extracting water..."
          osmium tags-filter "$OSM_PBF" w/water w/waterway w/natural=water -o region_layers/water.osm.pbf --overwrite 2>/dev/null || true
          if [ -f region_layers/water.osm.pbf ]; then
            osmium cat region_layers/water.osm.pbf -o region_layers/water_temp.osm
            # Пробуем извлечь и линии и полигоны
            ogr2ogr -f GeoJSON -t_srs EPSG:4326 "region_layers/water_lines.geojson" "region_layers/water_temp.osm" lines -skipfailures 2>/dev/null || true
            ogr2ogr -f GeoJSON -t_srs EPSG:4326 "region_layers/water_poly.geojson" "region_layers/water_temp.osm" multipolygons -skipfailures 2>/dev/null || true
            python3 -c "
import json
water = []
for fname in ['region_layers/water_lines.geojson', 'region_layers/water_poly.geojson']:
    import os
    if os.path.exists(fname):
        with open(fname) as f:
            data = json.load(f)
            water.extend(data.get('features', []))
with open('region_layers/water.geojson', 'w') as f:
    json.dump({'type': 'FeatureCollection', 'features': water}, f)
print(f'Water features: {len(water)}')
"
            rm -f region_layers/water_temp.osm region_layers/water.osm.pbf region_layers/water_lines.geojson region_layers/water_poly.geojson
          else
            echo '{"type":"FeatureCollection","features":[]}' > "region_layers/water.geojson"
          fi
          
          # Landuse (landuse, leisure, natural)
          echo "Extracting landuse..."
          osmium tags-filter "$OSM_PBF" w/landuse w/leisure w/natural -o region_layers/landuse.osm.pbf --overwrite 2>/dev/null || true
          if [ -f region_layers/landuse.osm.pbf ]; then
            osmium cat region_layers/landuse.osm.pbf -o region_layers/landuse_temp.osm
            ogr2ogr -f GeoJSON -t_srs EPSG:4326 "region_layers/landuse.geojson" "region_layers/landuse_temp.osm" multipolygons -skipfailures 2>/dev/null || echo '{"type":"FeatureCollection","features":[]}' > "region_layers/landuse.geojson"
            rm -f region_layers/landuse_temp.osm region_layers/landuse.osm.pbf
          else
            echo '{"type":"FeatureCollection","features":[]}' > "region_layers/landuse.geojson"
          fi
          
          echo "Layer extraction complete"

          # --- ЭТАП 2: Подсчет объектов в слоях ---
          echo "📊 Counting features in layers..."
          
          for f in region_layers/roads.geojson region_layers/building.geojson region_layers/places.geojson region_layers/water.geojson region_layers/landuse.geojson; do
            if [ -f "$f" ]; then
              count=$(python3 -c "import json; print(len(json.load(open('$f')).get('features', [])))")
              echo "  $f: $count features"
            else
              echo "  $f: FILE NOT FOUND"
            fi
          done

          # --- ЭТАП 3: Диагностика ---
          echo "=== Diagnostic: Final feature counts ==="
          total=0
          for f in region_layers/roads.geojson region_layers/building.geojson region_layers/places.geojson region_layers/water.geojson region_layers/landuse.geojson district.geojson; do
            if [ -f "$f" ]; then
              count=$(python3 -c "import json; print(len(json.load(open('$f')).get('features', [])))")
              echo "  $f: $count features"
              total=$((total + count))
            else
              echo "  $f: FILE NOT FOUND"
            fi
          done
          echo "  TOTAL: $total features"
          echo "==============================="

          # Не прерываем работу если нет данных в некоторых слоях - это допустимо
          if [ "$total" -eq 0 ]; then
            echo "⚠️ WARNING: No features found, but continuing with boundaries only"
          fi

          # --- ЭТАП 4: Генерация тайлов ---
          echo "🗺 Generating MBTiles with tippecanoe..."
          rm -f map.mbtiles
          
          # Собираем список файлов для tippecanoe (только существующие)
          TIPPECANOE_ARGS="--projection=EPSG:3857 -o map.mbtiles --force -Z $MIN_ZOOM -z $MAX_ZOOM --no-tile-size-limit --detect-longitude-wraparound --reorder --read-parallel -v"
          
          # Всегда добавляем boundaries
          if [ -f district.geojson ]; then
            TIPPECANOE_ARGS="$TIPPECANOE_ARGS -l boundaries district.geojson"
          fi
          
          # Добавляем остальные слои если они существуют и содержат данные
          for layer_name in transportation building places water landuse; do
            case $layer_name in
              transportation) geojson_file="region_layers/roads.geojson" ;;
              building) geojson_file="region_layers/building.geojson" ;;
              places) geojson_file="region_layers/places.geojson" ;;
              water) geojson_file="region_layers/water.geojson" ;;
              landuse) geojson_file="region_layers/landuse.geojson" ;;
            esac
            
            if [ -f "$geojson_file" ]; then
              count=$(python3 -c "import json; print(len(json.load(open('$geojson_file')).get('features', [])))")
              if [ "$count" -gt 0 ]; then
                TIPPECANOE_ARGS="$TIPPECANOE_ARGS -l $layer_name $geojson_file"
                echo "Adding layer: $layer_name ($count features)"
              else
                echo "Skipping empty layer: $layer_name"
              fi
            else
              echo "Skipping missing layer: $layer_name"
            fi
          done
          
          echo "Running tippecanoe: $TIPPECANOE_ARGS"
          eval tippecanoe $TIPPECANOE_ARGS 2>&1 | tee tippecanoe.log
          
          # --- ЭТАП 5: Проверка результата ---
          if [ -f map.mbtiles ]; then
            SIZE=$(ls -lh map.mbtiles | awk '{print $5}')
            echo "✅ Generated map.mbtiles ($SIZE)"
            
            echo "Checking tile statistics..."
            sqlite3 map.mbtiles "SELECT zoom_level, COUNT(*) as tile_count FROM tiles GROUP BY zoom_level ORDER BY zoom_level;" || true
          else
            echo "❌ Failed to generate map.mbtiles"
            exit 1
          fi
          
          # --- ЭТАП 6: Извлечение в папку tiles ---
          rm -rf tiles/
          mkdir -p tiles
          echo "📂 Extracting tiles with mb-util..."
          mb-util --image_format=pbf map.mbtiles tiles/
          
          # Добавляем metadata.json для совместимости
          if [ -f tiles/metadata.json ]; then
            echo "metadata.json exists"
          else
            echo '{}' > tiles/metadata.json
          fi
          
          echo "✅ Tiles generated successfully"
          ls -lh tiles/
          echo "Tile directories:"
          ls tiles/ | grep -E '^[0-9]+$' || echo "No zoom level directories found!"

      - name: Upload Tiles Artifact
        uses: actions/upload-artifact@v4
        with:
          name: map-tiles
          path: tiles/
          retention-days: 7

      - name: Commit and Push Tiles
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add tiles/ || true
          git commit -m "Update map tiles [skip ci]" || true
          git push || true
