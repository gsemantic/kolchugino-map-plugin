name: Generate Offline Map Tiles

on:
  workflow_dispatch:
    inputs:
      min_zoom:
        description: 'Min zoom level'
        required: true
        default: '10'
      max_zoom:
        description: 'Max zoom level'
        required: true
        default: '14'
      district_name:
        description: 'District name for boundary search'
        required: true
        default: 'Кольчугинский район'
  schedule:
    - cron: '0 3 * * 0'

jobs:
  generate-tiles:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            tippecanoe \
            python3-pip \
            osmium-tool \
            gdal-bin \
            sqlite3 \
            curl \
            jq
          pip3 install mbutil

      - name: Download OSM Data via Overpass API
        id: download_overpass
        run: |
          echo "Downloading OSM data for Vladimir Region via Overpass API..."
          
          cat > overpass-query.ql << 'QUERYEOF'
          [out:xml][timeout:180];
          (
            way["highway"](55.5,38.0,56.8,42.5);
            node["place"](55.5,38.0,56.8,42.5);
            way["building"](55.5,38.0,56.8,42.5);
            relation["boundary"="administrative"]["admin_level"="4"]["name"="Владимирская область"];
          );
          out body;
          QUERYEOF
          
          curl -s -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "data@overpass-query.ql" \
            -o region.osm \
            "https://overpass-api.de/api/interpreter"
          
          if [ ! -f region.osm ] || [ ! -s region.osm ]; then
            echo "::error::Overpass API returned empty response"
            exit 1
          fi
          
          # Check if response contains HTML error page
          if head -c 200 region.osm | grep -qi "<html"; then
            echo "::error::Overpass API returned HTML error page:"
            cat region.osm
            exit 1
          fi
          
          echo "Response size: $(du -h region.osm | cut -f1)"
          osmium cat region.osm -o region.osm.pbf
          echo "PBF size: $(du -h region.osm.pbf | cut -f1)"

      - name: Extract District Boundary
        id: extract_boundary
        # Попытка #5: Полная отладка, конвертация через osmium cat -> OSM -> ogr2ogr
        run: |
          DISTRICT_NAME="${{ github.event.inputs.district_name || 'Кольчугинский район' }}"
          echo "Searching for boundary: $DISTRICT_NAME"
          
          # Filter administrative boundaries
          osmium tags-filter -o boundary.osm.pbf region.osm.pbf \
            r/boundary=administrative \
            --overwrite
          
          if [ ! -f boundary.osm.pbf ] || [ ! -s boundary.osm.pbf ]; then
            echo "::error::Boundary extraction failed"
            exit 1
          fi
          
          # Convert PBF to OSM XML first
          osmium cat boundary.osm.pbf -o boundary.osm
          
          # Convert OSM XML to GeoJSON using ogr2ogr (from gdal-bin)
          # OSM data in ogr2ogr is split into layers: points, lines, multilinestrings, multipolygons
          # Boundaries (relations) are usually in 'multipolygons' layer
          if ! ogr2ogr -f GeoJSON boundary.geojson boundary.osm multipolygons; then
            echo "Warning: 'multipolygons' layer not found or empty, trying to convert all layers..."
            ogr2ogr -f GeoJSON boundary.geojson boundary.osm
          fi
          
          # Use jq to find the matching district
          python3 << 'PYEOF'
          import json
          import sys
          import os

          district_name = os.environ.get('DISTRICT_NAME', 'Кольчугинский район')
          
          if not os.path.exists('boundary.geojson'):
              print("Error: boundary.geojson not found", file=sys.stderr)
              sys.exit(1)

          with open('boundary.geojson', 'r', encoding='utf-8') as f:
              data = json.load(f)
          
          found = False
          if data.get('type') == 'FeatureCollection':
              print(f"Found {len(data.get('features', []))} features in GeoJSON")
              for feature in data.get('features', []):
                  props = feature.get('properties', {})
                  name = props.get('name', '') or props.get('NAME', '')
                  print(f"Checking feature with name: '{name}'")
                  if district_name.lower() in name.lower():
                      found = True
                      with open('district.geojson', 'w', encoding='utf-8') as out:
                          json.dump(feature, out, ensure_ascii=False, indent=2)
                      print(f"Found district: {name}")
                      break
          
          if not found:
              print(f"District '{district_name}' not found in GeoJSON", file=sys.stderr)
              # Print all found names for debugging
              if data.get('type') == 'FeatureCollection':
                  names = [f.get('properties', {}).get('name', '') for f in data.get('features', [])]
                  print(f"Available names: {names}", file=sys.stderr)
              sys.exit(1)
          PYEOF
          
          if [ ! -f district.geojson ] || [ ! -s district.geojson ]; then
            echo "::error::District boundary not found"
            exit 1
          fi
          
          echo "district_file=district.geojson" >> $GITHUB_OUTPUT

      - name: Generate Map Tiles
        id: generate_tiles
        run: |
          MIN_ZOOM="${{ github.event.inputs.min_zoom || 10 }}"
          MAX_ZOOM="${{ github.event.inputs.max_zoom || 14 }}"
          
          echo "Generating tiles from zoom $MIN_ZOOM to $MAX_ZOOM..."
          
          tippecanoe -zg --projection=EPSG:3857 \
            -o map.pbf \
            --named-layer=boundaries:district.geojson \
            --named-layer=roads:region.osm.pbf \
            --named-layer=buildings:region.osm.pbf \
            --named-layer=places:region.osm.pbf \
            -l${{ github.event.inputs.district_name || 'Кольчугинский район' }} \
            --force
          
          mkdir -p tiles
          python3 -m mbutil.mapbox.pbf2dir map.pbf tiles/
          
          echo "Tiles generated successfully"
          ls -lh tiles/

      - name: Upload Tiles Artifact
        uses: actions/upload-artifact@v4
        with:
          name: map-tiles
          path: tiles/
          retention-days: 7

      - name: Commit and Push Tiles
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add tiles/ || true
          git commit -m "Update map tiles [skip ci]" || true
          git push || true
