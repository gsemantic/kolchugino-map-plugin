name: Generate Offline Map Tiles

on:
  workflow_dispatch:
    inputs:
      min_zoom:
        description: 'Min zoom level'
        required: true
        default: '12'
      max_zoom:
        description: 'Max zoom level'
        required: true
        default: '18'
      district_name:
        description: 'District name for boundary search'
        required: true
        default: 'Кольчугинский район'
  schedule:
    - cron: '0 3 * * 0'

jobs:
  generate-tiles:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            tippecanoe \
            python3-pip \
            osmium-tool \
            gdal-bin \
            sqlite3 \
            curl \
            jq
          pip3 install mbutil

      - name: Download OSM Data via Overpass API
        id: download_overpass
        run: |
          echo "Downloading OSM data for Vladimir Region via Overpass API..."
          
          cat > overpass-query.ql << 'QUERYEOF'
          [out:xml][timeout:300];
          (
            way["highway"](56.24,39.32,56.34,39.43);
            node["place"](56.24,39.32,56.34,39.43);
            way["building"](56.24,39.32,56.34,39.43);
            relation["boundary"="administrative"]["admin_level"~"4|5|6|7"]["name"~"Владимир|Кольчугин"];
          );
          out body;
          >;
          out skel qt;
          QUERYEOF
          
          MAX_RETRIES=3
          RETRY_COUNT=0
          SUCCESS=false
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$SUCCESS" = "false" ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Attempt $RETRY_COUNT of $MAX_RETRIES..."
            
            curl -s -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "data@overpass-query.ql" \
              -o region.osm \
              "https://overpass-api.de/api/interpreter"
            
            if [ -f region.osm ] && [ -s region.osm ]; then
              if ! head -c 200 region.osm | grep -qi "<html"; then
                SUCCESS=true
                echo "Download successful!"
              else
                echo "Attempt $RETRY_COUNT failed: Server returned HTML error"
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo "Waiting 30 seconds before retry..."
                  sleep 30
                fi
              fi
            else
              echo "Attempt $RETRY_COUNT failed: Empty response"
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "Waiting 30 seconds before retry..."
                sleep 30
              fi
            fi
          done
          
          if [ "$SUCCESS" = "false" ]; then
            echo "::error::Overpass API failed after $MAX_RETRIES attempts"
            if [ -f region.osm ]; then
              echo "Last response:"
              cat region.osm
            fi
            exit 1
          fi
          
          echo "Response size: $(du -h region.osm | cut -f1)"
          
          WAY_COUNT=$(grep -c '<way' region.osm || echo "0")
          NODE_COUNT=$(grep -c '<node' region.osm || echo "0")
          echo "OSM XML contains: $WAY_COUNT ways, $NODE_COUNT nodes"
          
          if [ "$NODE_COUNT" -eq 0 ] || [ "$WAY_COUNT" -eq 0 ]; then
            echo "::error::Downloaded OSM data seems incomplete (no ways or nodes)"
            exit 1
          fi
          
          osmium cat region.osm -o region.osm.pbf --overwrite
          echo "PBF size: $(du -h region.osm.pbf | cut -f1)"

      - name: Extract District Boundary
        id: extract_boundary
        run: |
          DISTRICT_NAME="${{ github.event.inputs.district_name || 'Кольчугинский район' }}"
          echo "Searching for boundary: $DISTRICT_NAME"
          
          osmium tags-filter -o boundary.osm.pbf region.osm.pbf \
            r/boundary=administrative \
            --overwrite
          
          if [ ! -f boundary.osm.pbf ] || [ ! -s boundary.osm.pbf ]; then
            echo "::error::Boundary extraction failed"
            exit 1
          fi
          
          osmium cat boundary.osm.pbf -o boundary.osm

          mkdir -p osm_layers

          for layer in points lines multilinestrings multipolygons other_relations; do
            if ogr2ogr -f GeoJSON "osm_layers/${layer}.geojson" boundary.osm "$layer" 2>/dev/null; then
              echo "Converted layer: $layer"
            fi
          done

          python3 scripts/merge_layers.py

          export DISTRICT_NAME="$DISTRICT_NAME" && python3 scripts/find_district_boundary.py

          if [ ! -f district.geojson ] || [ ! -s district.geojson ]; then
            echo "::warning::District boundary not found, using full region data"
            if [ -f osm_layers/multipolygons.geojson ]; then
              cp osm_layers/multipolygons.geojson district.geojson
            elif [ -f region_combined.geojson ]; then
              cp region_combined.geojson district.geojson
            else
              echo "::error::No fallback data available"
              exit 1
            fi
          fi

          echo "district_file=district.geojson" >> $GITHUB_OUTPUT

      - name: Generate Map Tiles
        id: generate_tiles
        run: |
          MIN_ZOOM="${{ github.event.inputs.min_zoom || 12 }}"
          MAX_ZOOM="${{ github.event.inputs.max_zoom || 18 }}"
          
          echo "Generating tiles from zoom $MIN_ZOOM to $MAX_ZOOM..."
          mkdir -p region_layers
          
          OSM_FILE="region.osm.pbf"
          if [ ! -f "$OSM_FILE" ] || [ ! -s "$OSM_FILE" ]; then
            echo "::error::OSM PBF file not found or empty"
            exit 1
          fi
          
          echo "📥 Extracting layers with osmium..."
          
          osmium tags-filter "$OSM_FILE" w/highway -o /tmp/roads.osm.pbf --overwrite
          osmium export /tmp/roads.osm.pbf -o region_layers/roads.geojson 2>/dev/null || echo '{"type":"FeatureCollection","features":[]}' > region_layers/roads.geojson
          
          osmium tags-filter "$OSM_FILE" w/building -o /tmp/buildings.osm.pbf --overwrite
          osmium export /tmp/buildings.osm.pbf -o region_layers/buildings.geojson 2>/dev/null || echo '{"type":"FeatureCollection","features":[]}' > region_layers/buildings.geojson
          
          osmium tags-filter "$OSM_FILE" n/place -o /tmp/places.osm.pbf --overwrite
          osmium export /tmp/places.osm.pbf -o region_layers/places.geojson 2>/dev/null || echo '{"type":"FeatureCollection","features":[]}' > region_layers/places.geojson
          
          osmium tags-filter "$OSM_FILE" wr/water wr/waterway wr/natural=water -o /tmp/water.osm.pbf --overwrite
          osmium export /tmp/water.osm.pbf -o region_layers/water.geojson 2>/dev/null || echo '{"type":"FeatureCollection","features":[]}' > region_layers/water.geojson
          
          osmium tags-filter "$OSM_FILE" wr/landuse wr/leisure wr/natural=wood wr/natural=forest wr/natural=grassland wr/natural=scrub wr/natural=wetland -o /tmp/landuse.osm.pbf --overwrite
          osmium export /tmp/landuse.osm.pbf -o region_layers/landuse.geojson 2>/dev/null || echo '{"type":"FeatureCollection","features":[]}' > region_layers/landuse.geojson
          
          echo "=== Layer statistics ==="
          total=0
          for f in region_layers/*.geojson; do
            if [ -f "$f" ]; then
              count=$(python3 -c "import json; print(len(json.load(open('$f')).get('features', [])))")
              echo "  $(basename $f): $count features"
              total=$((total + count))
            fi
          done
          echo "  TOTAL: $total features"
          echo "========================"
          
          if [ "$total" -eq 0 ]; then
            echo "❌ CRITICAL ERROR: No features in any layer!"
            exit 1
          fi
          
          echo "🗺 Generating MBTiles with tippecanoe..."
          rm -f map.mbtiles
          
          TIPPECANOE_ARGS="--projection=EPSG:3857 -o map.mbtiles --force -Z$MIN_ZOOM -z$MAX_ZOOM --no-tile-size-limit --detect-longitude-wraparound --reorder --read-parallel -v"
          
          add_layer() {
            local name="$1"
            local file="$2"
            if [ -f "$file" ]; then
              local count=$(python3 -c "import json; print(len(json.load(open('$file')).get('features', [])))")
              if [ "$count" -gt 0 ]; then
                TIPPECANOE_ARGS="$TIPPECANOE_ARGS -l $name $file"
                echo "  ✓ Adding layer '$name' ($count features)"
              else
                echo "  ⚠ Skipping empty layer '$name'"
              fi
            else
              echo "  ⚠ Skipping missing layer '$name'"
            fi
          }
          
          if [ -f "district.geojson" ] && [ -s "district.geojson" ]; then
            add_layer "boundaries" "district.geojson"
          else
            add_layer "boundaries" "region_layers/boundaries.geojson"
          fi
          
          add_layer "transportation" "region_layers/roads.geojson"
          add_layer "building" "region_layers/buildings.geojson"
          add_layer "places" "region_layers/places.geojson"
          add_layer "water" "region_layers/water.geojson"
          add_layer "landuse" "region_layers/landuse.geojson"
          
          echo "Running: tippecanoe $TIPPECANOE_ARGS"
          tippecanoe $TIPPECANOE_ARGS 2>&1 | tee tippecanoe.log
          
          if [ -f map.mbtiles ]; then
            SIZE=$(ls -lh map.mbtiles | awk '{print $5}')
            echo "✅ Generated map.mbtiles ($SIZE)"
            sqlite3 map.mbtiles "SELECT zoom_level, COUNT(*) as tile_count FROM tiles GROUP BY zoom_level ORDER BY zoom_level;" || true
          else
            echo "❌ Failed to generate map.mbtiles"
            exit 1
          fi
          
          rm -rf tiles/
          mkdir -p tiles
          echo "📂 Extracting tiles with mb-util..."
          mb-util --image_format=pbf map.mbtiles tiles/
          
          if [ ! -f tiles/metadata.json ]; then
            echo '{}' > tiles/metadata.json
          fi
          
          echo "✅ Done"
          ls -lh tiles/
          ls tiles/ | grep -E '^[0-9]+$' || echo "No zoom level directories found!"

      - name: Upload Tiles Artifact
        uses: actions/upload-artifact@v4
        with:
          name: map-tiles
          path: tiles/
          retention-days: 7

      - name: Commit and Push Tiles
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add tiles/ || true
          git commit -m "Update map tiles [skip ci]" || true
          git push || true
