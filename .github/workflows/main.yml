name: Generate Offline Map Tiles

on:
  workflow_dispatch:
    inputs:
      min_zoom:
        description: 'Min zoom level'
        required: true
        default: '10'
      max_zoom:
        description: 'Max zoom level'
        required: true
        default: '14'
      district_name:
        description: 'District name for boundary search'
        required: true
        default: 'Кольчугинский район'
  schedule:
    - cron: '0 3 * * 0'

jobs:
  generate-tiles:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            tippecanoe \
            python3-pip \
            osmium-tool \
            gdal-bin \
            sqlite3 \
            curl \
            jq
          pip3 install mbutil

      - name: Download OSM Data via Overpass API
        id: download_overpass
        run: |
          echo "Downloading OSM data for Vladimir Region via Overpass API..."
          
          cat > overpass-query.ql << 'QUERYEOF'
          [out:xml][timeout:300];
          (
            // Загружаем все дороги, здания и места в области вокруг Кольчугино (центр: 56.294425, 39.375751)
            way["highway"](56.24,39.32,56.34,39.43);
            node["place"](56.24,39.32,56.34,39.43);
            way["building"](56.24,39.32,56.34,39.43);
            
            // Загружаем административные границы всех уровней для Владимирской области
            relation["boundary"="administrative"]["admin_level"~"4|5|6|7"]["name"~"Владимир|Кольчугин"];
          );
          out body;
          QUERYEOF
          
          # Retry logic for Overpass API (up to 3 attempts with delays)
          MAX_RETRIES=3
          RETRY_COUNT=0
          SUCCESS=false
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$SUCCESS" = "false" ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Attempt $RETRY_COUNT of $MAX_RETRIES..."
            
            curl -s -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "data@overpass-query.ql" \
              -o region.osm \
              "https://overpass-api.de/api/interpreter"
            
            if [ -f region.osm ] && [ -s region.osm ]; then
              # Check if response contains HTML error page
              if ! head -c 200 region.osm | grep -qi "<html"; then
                SUCCESS=true
                echo "Download successful!"
              else
                echo "Attempt $RETRY_COUNT failed: Server returned HTML error"
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo "Waiting 30 seconds before retry..."
                  sleep 30
                fi
              fi
            else
              echo "Attempt $RETRY_COUNT failed: Empty response"
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "Waiting 30 seconds before retry..."
                sleep 30
              fi
            fi
          done
          
          if [ "$SUCCESS" = "false" ]; then
            echo "::error::Overpass API failed after $MAX_RETRIES attempts"
            if [ -f region.osm ]; then
              echo "Last response:"
              cat region.osm
            fi
            exit 1
          fi
          
          echo "Response size: $(du -h region.osm | cut -f1)"
          osmium cat region.osm -o region.osm.pbf --overwrite
          echo "PBF size: $(du -h region.osm.pbf | cut -f1)"

      - name: Extract District Boundary
        id: extract_boundary
        run: |
          DISTRICT_NAME="${{ github.event.inputs.district_name || 'Кольчугинский район' }}"
          echo "Searching for boundary: $DISTRICT_NAME"
          
          # Filter administrative boundaries
          osmium tags-filter -o boundary.osm.pbf region.osm.pbf \
            r/boundary=administrative \
            --overwrite
          
          if [ ! -f boundary.osm.pbf ] || [ ! -s boundary.osm.pbf ]; then
            echo "::error::Boundary extraction failed"
            exit 1
          fi
          
          # Convert PBF to OSM XML first
          osmium cat boundary.osm.pbf -o boundary.osm

          # Создаем директорию для слоев
          mkdir -p osm_layers

          # Конвертируем каждый слой OSM отдельно в GeoJSON
          for layer in points lines multilinestrings multipolygons other_relations; do
            if ogr2ogr -f GeoJSON "osm_layers/${layer}.geojson" boundary.osm "$layer" 2>/dev/null; then
              echo "Converted layer: $layer"
            fi
          done

          # Объединяем все GeoJSON файлы в один
          python3 scripts/merge_layers.py

          # Поиск района в GeoJSON (используем улучшенный скрипт)
          export DISTRICT_NAME="$DISTRICT_NAME" && python3 scripts/find_district_boundary.py

          if [ ! -f district.geojson ] || [ ! -s district.geojson ]; then
            echo "::warning::District boundary not found, using full region data"
            # Если район не найден, используем все границы из файла
            if [ -f osm_layers/multipolygons.geojson ]; then
              cp osm_layers/multipolygons.geojson district.geojson
            elif [ -f region_combined.geojson ]; then
              cp region_combined.geojson district.geojson
            else
              echo "::error::No fallback data available"
              exit 1
            fi
          fi

          echo "district_file=district.geojson" >> $GITHUB_OUTPUT

      - name: Generate Map Tiles
        id: generate_tiles
        run: |
          MIN_ZOOM="${{ github.event.inputs.min_zoom || 10 }}"
          MAX_ZOOM="${{ github.event.inputs.max_zoom || 14 }}"
          
          echo "Generating tiles from zoom $MIN_ZOOM to $MAX_ZOOM..."
          
          # Конвертируем region.osm.pbf в OSM XML, затем в GeoJSON (аналогично предыдущему шагу)
          osmium cat region.osm.pbf -o region.osm --overwrite
          
          mkdir -p region_layers
          
          # Конвертируем каждый слой отдельно с явным указанием формата OSM
          for layer in points lines multilinestrings multipolygons other_relations; do
            if ogr2ogr -f GeoJSON -nlt GEOMETRY "region_layers/${layer}.geojson" OSM:"region.osm" "$layer" 2>/dev/null; then
              count=$(python3 -c "import json; print(len(json.load(open('region_layers/${layer}.geojson'))['features']))")
              echo "Converted region layer: $layer (features: $count)"
            else
              echo "Warning: Failed to convert layer $layer"
              echo '{"type":"FeatureCollection","features":[]}' > "region_layers/${layer}.geojson"
            fi
          done
          
          # Фильтруем данные по типам объектов для каждого слоя
          
          # 1. Дороги (из lines)
          if [ -f region_layers/lines.geojson ]; then
            python3 -c "import json; data=json.load(open('region_layers/lines.geojson')); roads=[f for f in data.get('features',[]) if 'highway' in f.get('properties',{})]; json.dump({'type':'FeatureCollection','features':roads},open('region_layers/roads.geojson','w')); print(f'Extracted {len(roads)} road features')"
          else
            echo '{"type":"FeatureCollection","features":[]}' > region_layers/roads.geojson
            echo "No lines layer found, created empty roads.geojson"
          fi
          
          # 2. Здания (из multipolygons и других полигонов)
          python3 -c "import json; features=[]; [features.extend([f for f in json.load(open(f'region_layers/{ln}.geojson')).get('features',[]) if 'building' in f.get('properties',{})]) for ln in ['multipolygons','other_relations'] if __import__('os').path.exists(f'region_layers/{ln}.geojson')]; json.dump({'type':'FeatureCollection','features':features},open('region_layers/buildings.geojson','w')); print(f'Total building features: {len(features)}')"
          
          # 3. Места (из points)
          if [ -f region_layers/points.geojson ]; then
            python3 -c "import json; data=json.load(open('region_layers/points.geojson')); places=[f for f in data.get('features',[]) if 'place' in f.get('properties',{})]; json.dump({'type':'FeatureCollection','features':places},open('region_layers/places.geojson','w')); print(f'Extracted {len(places)} place features')"
          else
            echo '{"type":"FeatureCollection","features":[]}' > region_layers/places.geojson
            echo "No points layer found, created empty places.geojson"
          fi
          
          # Диагностика: проверяем количество объектов в каждом слое
          echo "=== Diagnostic: Feature counts ==="
          for f in district.geojson region_layers/roads.geojson region_layers/buildings.geojson region_layers/places.geojson; do
            if [ -f "$f" ]; then
              count=$(python3 -c "import json; print(len(json.load(open('$f')).get('features', [])))")
              echo "$f: $count features"
            else
              echo "$f: FILE NOT FOUND"
            fi
          done
          echo "==============================="

          # Создаем тайлы с использованием tippecanoe
          rm -f map.mbtiles
          tippecanoe --projection=EPSG:3857 \
            -o map.mbtiles \
            -l boundaries district.geojson \
            -l roads region_layers/roads.geojson \
            -l buildings region_layers/buildings.geojson \
            -l places region_layers/places.geojson \
            --force \
            -Z$MIN_ZOOM -z$MAX_ZOOM \
            -v
          
          # Очищаем старую папку с тайлами (mb-util требует, чтобы папка не существовала)
          rm -rf tiles/

          # Используем mb-util для извлечения тайлов из MBTiles
          mb-util --image_format=pbf map.mbtiles tiles/
          
          echo "Tiles generated successfully"
          ls -lh tiles/

      - name: Upload Tiles Artifact
        uses: actions/upload-artifact@v4
        with:
          name: map-tiles
          path: tiles/
          retention-days: 7

      - name: Commit and Push Tiles
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add tiles/ || true
          git commit -m "Update map tiles [skip ci]" || true
          git push || true
